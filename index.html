<!-- Contentor Principal da Planilha -->
<div class="spreadsheet-container">
    
    <!-- Linha de Cabeçalho (Títulos das Colunas) -->
    <div class="spreadsheet-header">
        <span class="col-status">Status</span>
        <span class="col-task">Tarefa / Item</span>
        <span class="col-responsible">Responsável</span>
        <span class="col-priority">Prioridade</span>
    </div>

    <!-- Linhas de Exemplo (Repita para testar o visual) -->
    <div class="spreadsheet-row">
        <div class="col-status">
            <input type="checkbox">
        </div>
        <div class="col-task">
            <input type="text" value="Exemplo de tarefa para testar o espaço" class="cell-input">
        </div>
        <div class="col-responsible">
            <input type="text" value="João Silva" class="cell-input">
        </div>
        <div class="col-priority">
            <select class="cell-select">
                <option>Alta</option>
                <option>Média</option>
                <option>Baixa</option>
            </select>
        </div>
    </div>

</div>
