<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Checklist operacional para acompanhamento do fluxo de projetos, análise gerencial e controlo de qualidade CQ MDU.">
    <meta name="theme-color" content="#ffffff">
    <title>Checklist Operacional — CQ MDU</title>
    ./style.css
</head>
<body>
    #conteudoPrincipal
        Ir para o conteúdo principal
    </a>

    <header class="mobile-header">
        <button
            id="menuToggle"
            class="hamburger-btn"
            type="button"
            aria-label="Abrir mapa do checklist"
            aria-expanded="false"
            aria-controls="checklistIndex"
        >
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
        </button>

        <div class="mobile-heading">
            <h1 class="mobile-title">
                Resolução de Casos
                <span class="section-hint" id="mobileSectionHint">
                    Fluxo Operacional
                </span>
            </h1>
        </div>
    </header>

    <div
        id="sidebarOverlay"
        class="sidebar-overlay"
        aria-hidden="true"
    ></div>

    <div class="app-grid">
        <nav
            id="checklistIndex"
            class="checklist-sidebar"
            aria-label="Mapa do processo"
            aria-hidden="true"
            tabindex="-1"
        >
            <div class="sidebar-header">
                Mapa do Processo
            </div>

            <div class="sidebar-links">
                #rumo-triagem
                    <span class="link-icon" aria-hidden="true">📋</span>
                    <span>1. Fluxo Operacional</span>
                </a>

                #rumo-tecnico
                    <span class="link-icon" aria-hidden="true">🔍</span>
                    <span>2. Análise Gerencial</span>
                </a>

                #rumo-operacional
                    <span class="link-icon" aria-hidden="true">✅</span>
                    <span>3. Controlo de Qualidade</span>
                </a>
            </div>
        </nav>

        <main
            id="conteudoPrincipal"
            class="spreadsheet-container"
            tabindex="-1"
        >
            <section
                id="rumo-triagem"
                class="case-section section-triagem"
                aria-labelledby="titulo-triagem"
            >
                <header class="section-banner">
                    <div class="banner-left">
                        <span class="banner-icon" aria-hidden="true">📋</span>

                        <div class="banner-titles">
                            <h2 id="titulo-triagem">
                                1. Fluxo Operacional
                            </h2>

                            <p class="banner-subtitle">
                                Projetos, implantação e andamento
                            </p>
                        </div>
                    </div>

                    <div
                        class="progress-pill"
                        role="progressbar"
                        aria-label="Progresso do Fluxo Operacional"
                        aria-valuemin="0"
                        aria-valuemax="2"
                        aria-valuenow="0"
                        aria-valuetext="0 de 2 tarefas concluídas"
                    >
                        <div class="progress-track" aria-hidden="true">
                            <div class="progress-fill"></div>
                        </div>

                        <span class="progress-pill-text">0/2</span>
                    </div>
                </header>

                <div
                    class="spreadsheet-meta-inputs"
                    aria-label="Informações do projeto"
                >
                    <div class="meta-field">
                        <label for="meta_w">
                            W da Semana
                        </label>

                        <input
                            type="text"
                            id="meta_w"
                            name="meta_w"
                            placeholder="Ex.: W26"
                            class="cell-input-border dynamic-save"
                            autocomplete="off"
                            maxlength="20"
                        >
                    </div>

                    <div class="meta-field">
                        <label for="meta_designer">
                            Projetista
                        </label>

                        <input
                            type="text"
                            id="meta_designer"
                            name="meta_designer"
                            placeholder="Nome do projetista"
                            class="cell-input-border dynamic-save"
                            autocomplete="name"
                            maxlength="100"
                        >
                    </div>

                    <div class="meta-field">
                        <label for="meta_date">
                            Data
                        </label>

                        <input
                            type="date"
                            id="meta_date"
                            name="meta_date"
                            class="cell-input-border dynamic-save"
                        >
                    </div>
                </div>

                <div
                    class="table-wrapper"
                    role="group"
                    aria-label="Tarefas do Fluxo Operacional"
                >
                    <div class="table-row">
                        <div class="cell-check">
                            <input
                                type="checkbox"
                                id="op_1"
                                name="op_1"
                                class="custom-checkbox dynamic-save"
                            >
                        </div>

                        <div class="cell-text">
                            <label for="op_1">
                                Pasta implantada da área — verificar mapa/unifilar e nodes de acordo
                            </label>
                        </div>
                    </div>

                    <div class="table-row">
                        <div class="cell-check">
                            <input
                                type="checkbox"
                                id="op_2"
                                name="op_2"
                                class="custom-checkbox dynamic-save"
                            >
                        </div>

                        <div class="cell-text">
                            <label for="op_2">
                                Salvar Revisão Atual e Nova
                            </label>
                        </div>
                    </div>

                    <div class="table-row-special">
                        <label for="op_txt">
                            Andamento do Projeto
                        </label>

                        <textarea
                            id="op_txt"
                            name="op_txt"
                            rows="3"
                            maxlength="2000"
                            placeholder="Descreva o andamento atual do projeto..."
                            class="dynamic-save"
                        ></textarea>
                    </div>
                </div>
            </section>

            <section
                id="rumo-tecnico"
                class="case-section section-tecnico"
                aria-labelledby="titulo-tecnico"
            >
                <header class="section-banner">
